# =====================================================
# Kernel Configuration File
# Component: Post Office
# =====================================================
#
# Controls the behaviour of the local post office.
# Some values require elevated permissions.
#

[post_office]

# Money received for each delivered package.
# Range: 1 - 10

salary = 1

# Number of working days per week.
# Range: 1 - 7

work_days = 5
